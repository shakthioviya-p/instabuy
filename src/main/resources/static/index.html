<!DOCTYPE html>
<html>
<head>
    <title>Dealer Login</title>

    <style>
        body {
            font-family: Poppins, sans-serif;
            background: #131921;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff9900;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .link {
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            color: blue;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Dealer Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="link" onclick="goSignup()">New dealer? Signup</div>
</div>

<script>
function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    fetch(`/dealer/login?email=${email}&password=${password}`, {
        method: "POST"
    })
    .then(res => {
        if (!res.ok) throw new Error("Login failed");
        return res.json();
    })
    .then(data => {
        // Save dealer info in localStorage
        localStorage.setItem("dealerId", data.dealerId);
        localStorage.setItem("name", data.name);
        localStorage.setItem("email", data.email);

        // ✅ Redirect to dashboard after login
        window.location.href = "dashboard.html";
    })
    .catch(() => alert("Invalid login"));
}

function goSignup() {
    window.location.href = "signup.html";
}
</script>

</body>
</html>
