<!DOCTYPE html>
<html>
<head>
    <title>Dealer Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f5f5f5; }

        .navbar { background-color: #131921; }

        .navbar-brand { color: white !important; font-weight: bold; }

        .profile { color: white; }

        .card {
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<nav class="navbar p-3">
    <span class="navbar-brand">INSTABUY</span>
    <span class="profile" id="dealerInfo"></span>
    <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
</nav>

<div class="container mt-4">

    <input type="text" id="searchBox" class="form-control mb-4"
           placeholder="🔍 Search..." onkeyup="searchProducts()">

    <div class="row mb-4 text-center">
        <div class="col-md-4">
            <button class="btn btn-primary" onclick="showAdd()">Add Product</button>
        </div>
        <div class="col-md-4">
            <button class="btn btn-primary" onclick="loadProducts()">Your Products</button>
        </div>
        <div class="col-md-4">
            <button class="btn btn-danger" onclick="loadLowStock()">Low Stock</button>
        </div>
    </div>

    <div id="addForm" style="display:none;">
        <input id="pname" placeholder="Name" class="form-control mb-2">
        <input id="desc" placeholder="Description" class="form-control mb-2">
        <input id="qty" type="number" placeholder="Quantity" class="form-control mb-2">
        <input id="price" type="number" placeholder="Price" class="form-control mb-2">

        <button onclick="addProduct()" class="btn btn-success">Add</button>
    </div>

    <div id="list" class="row mt-4"></div>

</div>

<script>

let allProducts = [];

// 🔐 PROTECT PAGE
if (!localStorage.getItem("dealerId")) {
    alert("Login required");
    window.location.href = "index.html";
}

// SHOW USER
dealerInfo.innerText =
    localStorage.getItem("name") + " | " + localStorage.getItem("email");

// SHOW FORM
function showAdd() {
    addForm.style.display = "block";
}

// ADD PRODUCT
function addProduct() {
    fetch("/product/add", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            productName: pname.value,
            description: desc.value,
            quantity: parseInt(qty.value),
            price: parseFloat(price.value),
            dealerId: localStorage.getItem("dealerId")
        })
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        loadProducts(); // refresh list
    });
}

// LOAD PRODUCTS
function loadProducts() {
    const dealerId = localStorage.getItem("dealerId");

    fetch(`/product/dealer/${dealerId}`)
    .then(res => res.json())
    .then(data => {
        allProducts = data;
        displayProducts(data);
    });
}

// LOAD LOW STOCK
function loadLowStock() {
    const dealerId = localStorage.getItem("dealerId");

    fetch(`/product/lowstock/${dealerId}`)
    .then(res => res.json())
    .then(data => {
        allProducts = data;
        displayProducts(data);
    });
}

// DISPLAY
function displayProducts(data) {
    list.innerHTML = "";

    if (data.length === 0) {
        list.innerHTML = "<p class='text-center'>No products found</p>";
        return;
    }

    data.forEach(p => {
        list.innerHTML += `
        <div class="col-md-4 mb-3">
            <div class="card p-3">
                <h5>${p.productName}</h5>
                <p>${p.description}</p>
                <p>Qty: ${p.quantity}</p>
                <p>Price: ₹${p.price}</p>

                <button class="btn btn-danger" onclick="deleteProduct(${p.productId})">Delete</button>
            </div>
        </div>`;
    });
}

// SEARCH
function searchProducts() {
    let k = searchBox.value.toLowerCase();

    let filtered = allProducts.filter(p =>
        p.productName.toLowerCase().includes(k)
    );

    displayProducts(filtered);
}

// DELETE
function deleteProduct(id) {
    fetch(`/product/delete/${id}`, { method: "DELETE" })
    .then(res => res.text())
    .then(() => loadProducts());
}

// LOGOUT
function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}

// AUTO LOAD
window.onload = loadProducts;

</script>

</body>
</html>
