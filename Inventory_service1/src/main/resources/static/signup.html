<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>
        body {
            font-family: Poppins;
            background: #131921;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff9900;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
        }

        .link {
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            color: blue;
        }
    </style>
</head>

<body>

<div class="card">

<h2>Dealer Signup</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="confirm" type="password" placeholder="Confirm Password">
<input id="phone" placeholder="Phone Number">

<select id="type">
    <option>Electronics</option>
    <option>Beauty Products</option>
    <option>Medicine</option>
    <option>Skincare</option>
    <option>Clothing</option>
</select>

<button onclick="signup()">Signup</button>

<div class="link" onclick="goLogin()">Already have account? Login</div>

</div>

<script>
function signup() {

    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if(password !== confirm){
        alert("Passwords do not match");
        return;
    }

    fetch("/dealer/signup", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: password
        })
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
        window.location.href = "index.html";
    });
}

function goLogin(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
